name: Build Multi-Platform Executables

on:
  push:
    branches: [ "main", "master" ]
  release:
    types: [ "published" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Windows 需要 Pillow 来生成 .ico，macOS 不需要但安装也无妨
          pip install Pillow

      # ---------- macOS: 将 PNG 转换为 .icns ----------
      - name: Convert PNG to ICNS (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          cp icon.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      # ---------- Windows: 将 PNG 转换为 .ico ----------
      - name: Convert PNG to ICO (Windows)
        if: runner.os == 'Windows'
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icon.png')
          # 生成包含多种尺寸的 .ico 文件
          sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
          img.save('icon.ico', format='ICO', sizes=sizes)
          "

      # ---------- 打包：根据平台使用不同图标参数 ----------
      - name: Build executable with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --name "video_encode" --icon=icon.icns main.py

      - name: Build executable with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name "video_encode" --icon=icon.ico main.py

      # ---------- 上传产物 ----------
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: video_encode-${{ runner.os }}
          path: dist/